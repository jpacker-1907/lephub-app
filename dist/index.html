<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The STRIDE Way — Family Enterprise Member Portal</title>
    <script type="module" crossorigin src="/assets/index-BpKCrRx1.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-COF2V0aU.css">
  </head>
  <body>
    <div id="root"></div>

    <!-- Hidden forms so Netlify detects them at build time.
         React renders the real forms at runtime; these are just here so
         Netlify knows about them. The JSX forms post to '/' and Netlify
         matches them by the form-name hidden field. -->
    <form name="lep-overview-download" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="firstName" />
      <input type="email" name="email" />
      <input type="hidden" name="form-name" value="lep-overview-download" />
      <input name="bot-field" />
    </form>
    <form name="lephub-inquiry" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="firstName" />
      <input type="text" name="lastName" />
      <input type="email" name="email" />
      <input type="text" name="organization" />
      <select name="inquiryType"><option value=""></option></select>
      <textarea name="message"></textarea>
      <input type="hidden" name="form-name" value="lephub-inquiry" />
      <input name="bot-field" />
    </form>
  </body>
</html>
